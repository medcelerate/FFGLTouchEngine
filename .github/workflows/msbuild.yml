# separate terms of service, privacy policy, and support
# documentation.

name: Build

on:
  push:
    tags:
      - '*'

env:
  BUILD_CONFIGURATION: Release

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B build -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Generate Zip
      run: |
        New-Item -ItemType Directory -Force -Path staging
        Copy-Item "build\src\plugins\FFGLTouchEngine\Release\FFGLTouchEngine.dll" staging\
        Copy-Item "build\src\plugins\FFGLTouchEngineFX\Release\FFGLTouchEngineFX.dll" staging\
        Copy-Item "lib\TouchEngine\TouchEngine.dll" staging\
        "Copy FFGLTouchEngine.dll and FFGLTouchEngineFX.dll to your Resolume plugins folder" | Out-File staging\README.txt
        "${{ github.ref_name }}" | Out-File staging\VERSION.txt
        Compress-Archive -Path staging\* -Destination "FFGLTouchEngine-Windows-${{ github.ref_name }}.zip"

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: "FFGLTouchEngine-Windows-${{ github.ref_name }}.zip"

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Generate Xcode Project
      run: |
        mkdir -p build-mac
        cd build-mac
        cmake -G Xcode -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 ..

    - name: Build
      run: |
        xcodebuild -project build-mac/FFGLTouchEngine.xcodeproj \
          -scheme ALL_BUILD \
          -configuration Release

    - name: Generate Zip
      run: |
        cd build-mac/Release
        zip -r "../../FFGLTouchEngine-macOS-${{ github.ref_name }}.zip" \
          FFGLTouchEngine.bundle \
          FFGLTouchEngineFX.bundle

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: "FFGLTouchEngine-macOS-${{ github.ref_name }}.zip"

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-build

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: macos-build

    - name: Generate Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "FFGLTouchEngine-Windows-${{ github.ref_name }}.zip,FFGLTouchEngine-macOS-${{ github.ref_name }}.zip"
        generateReleaseNotes: true
        prerelease: false
